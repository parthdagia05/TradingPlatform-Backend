# docker-compose.yml - the single source of truth for `docker compose up`.
# brings up postgres + redis + api + worker, healthcheck-gated, with the
# seed CSV auto-loaded on first boot. zero manual steps.

services:

  # postgres 16
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nevup
      POSTGRES_PASSWORD: nevup
      POSTGRES_DB: nevup
    ports:
      - "5432:5432"           # exposed to host so you can `psql` from your laptop
    volumes:
      - postgres_data:/var/lib/postgresql/data    # persist across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevup -d nevup"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  # redis 7 (used as our message queue via Streams)
  redis:
    image: redis:7-alpine
    # AOF gives us durability so stream entries survive `compose restart`.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s

  # http api
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      # host names = compose service names, NOT localhost. inside a container,
      # localhost is the container itself, which has no DB or redis listening.
      DATABASE_URL: "postgres://nevup:nevup@postgres:5432/nevup?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02"
      LOG_LEVEL: "info"
      SEED_ON_START: "true"
      SEED_FILE_PATH: "/app/nevup_seed_dataset.csv"
      MIGRATIONS_DIR: "/app/migrations"
      STREAM_NAME: "trade-events"
      CONSUMER_GROUP: "metrics-workers"
      CONSUMER_NAME: "api-producer"   # api only produces, doesn't consume
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # async metrics worker. same image as api, different entrypoint.
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/worker"]
    environment:
      DATABASE_URL: "postgres://nevup:nevup@postgres:5432/nevup?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "97791d4db2aa5f689c3cc39356ce35762f0a73aa70923039d8ef72a2840a1b02"
      LOG_LEVEL: "info"
      STREAM_NAME: "trade-events"
      CONSUMER_GROUP: "metrics-workers"
      CONSUMER_NAME: "worker-1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        # wait for api to finish migrations + seed before the worker starts
        # consuming. avoids a race where the worker tries to UPDATE a metric
        # row whose table hasn't been created yet.
        condition: service_started
    restart: unless-stopped

# named volumes - persist across `docker compose down` (only `down -v` wipes)
volumes:
  postgres_data:
  redis_data:
