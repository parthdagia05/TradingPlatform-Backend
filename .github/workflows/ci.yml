# CI workflow that proves the Docker submission boots cleanly.
# Runs on every push and PR. Free for public repositories.
#
# What this proves (each green check = one spec line item):
#   ✓ Dockerfile builds (multi-stage, both binaries)
#   ✓ docker-compose.yml lifts the full stack from cold
#   ✓ Healthcheck-gated startup order works (postgres → redis → api → worker)
#   ✓ Migrations apply, CSV seeds, metric backfill runs
#   ✓ /health responds 200 with dbConnection=connected
#   ✓ POST /trades is idempotent (TestIdempotentTradeWrite)
#   ✓ Cross-tenant returns 403 (TestCrossTenantReturns403)
#   ✓ Missing auth returns 401 (TestUnauthenticatedReturns401)
#   ✓ /health exposes queue lag + DB state (TestHealthReturnsState)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: docker compose up + integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # Static checks — fast feedback on bad code before we burn time on Docker.
      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test (unit)
        run: go test -short ./...

      # Lint Dockerfile — catches the easy mistakes (root user, missing pin, etc.)
      - name: hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Allow Alpine package install without --no-cache (we already use it).
          ignore: DL3018

      # Bring up the full stack — this is the real submission test.
      - name: docker compose up
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: smoke /health
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health | grep -q '"status":"ok"'; then
              echo "api healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "api never became healthy"
          docker compose logs --tail=80
          exit 1

      - name: integration tests against the live stack
        env:
          API_URL: http://localhost:8080
        run: go test -v -count=1 ./tests/...

      - name: capture stack logs (for failures)
        if: failure()
        run: |
          echo "=== api logs ==="
          docker compose logs --tail=200 api
          echo "=== worker logs ==="
          docker compose logs --tail=200 worker
          echo "=== postgres logs ==="
          docker compose logs --tail=80 postgres
          echo "=== redis logs ==="
          docker compose logs --tail=40 redis

      - name: docker compose down
        if: always()
        run: docker compose down -v
